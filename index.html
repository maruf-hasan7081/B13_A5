<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub issues tracker | web</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
    
    <div class="text-center mb-6">
      <img class="w-20 h-20 mx-auto mb-4 rounded-full" src="./assets/github-logo.png" alt="GitHub Logo" />
      <h2 class="text-3xl font-bold text-gray-800">GitHub Issues Tracker</h2>
      <p class="text-sm text-gray-500 mt-1">Sign in to manage your issues</p>
    </div>

    <section>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input
          type="text"
          class="w-full px-4 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-violet-500"
          placeholder="Enter Username"
        />
        <p class="text-xs text-violet-600 mt-1">Default: admin</p>
      </div>

      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-violet-500"
          placeholder="Enter Password"
        />
        <p class="text-xs text-violet-600 mt-1">Default: admin123</p>
      </div>

      <button class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold py-2.5 rounded-md transition duration-300">
        Sign In
      </button>

      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="px-3 text-sm text-gray-500">OR</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <div class="bg-gray-100 rounded-md p-4 text-center">
        <p class="text-xs text-gray-500 mb-3">Demo Credentials:</p>
        <p class="text-sm text-gray-700"><span class="font-semibold">Username:</span> admin</p>
        <p class="text-sm text-gray-700"><span class="font-semibold">Password:</span> admin123</p>
      </div>
    </section>

  </div>

</body>
</html>
