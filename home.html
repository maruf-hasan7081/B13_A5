<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub issues tracker | web</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-[#f5f7fb]">

    <nav>
        <div class="navbar bg-white shadow-sm px-4 md:px-6 py-3">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between w-full gap-3">

                <div class="flex items-center gap-2">
                    <img src="./assets/github-logo.png" class="w-7 h-7" alt="GitHub Logo">
                    <h1 class="text-lg md:text-2xl font-semibold">GitHub Issues Tracker</h1>
                </div>

                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full md:w-auto">
                    <input id="search-input" type="text" placeholder="Search issues..."
                        class="input input-bordered w-full sm:w-64 md:w-72" />

                    <button id="search-btn" class="btn btn-primary text-white w-full sm:w-auto">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i>
                        Search
                    </button>
                </div>

            </div>

        </div>
    </nav>

    <main class="w-11/12 max-w-6xl mx-auto py-8">

        
        <section class="bg-white rounded-xl shadow-sm p-4 mb-5">
            <div class="flex gap-3 flex-wrap">
                <button id="tab-all" class="btn btn-sm btn-primary tab-btn">All</button>
                <button id="tab-open" class="btn btn-sm bg-gray-100 border-none tab-btn">Open</button>
                <button id="tab-closed" class="btn btn-sm bg-gray-100 border-none tab-btn">Closed</button>
            </div>
        </section>

       
        <section class="bg-white rounded-xl shadow-sm p-4 mb-5">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-violet-100 flex items-center justify-center text-violet-600">
                        <i class="fa-solid fa-circle-exclamation"></i>
                    </div>

                    <div>
                        <h2 id="issue-count" class="text-xl font-bold">0 Issues</h2>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 text-sm">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
                        <span>Open</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-violet-500 inline-block"></span>
                        <span>Closed</span>
                    </div>
                </div>

            </div>
        </section>

        
        <section id="loading-spinner" class="hidden py-10 text-center">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </section>

        
        <section id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        </section>

    </main>

   
    <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-2xl">
            <div id="modal-content"></div>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

   <script src="./script/home.js"></script>
</body>

</html>
