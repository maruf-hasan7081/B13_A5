<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub issues tracker | web</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./style/style.css">
</head>

<body>

    <nav>
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-6 py-3">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between w-full gap-3">

                <!-- Logo + Title -->
                <div class="flex items-center gap-2">
                    <img src="./assets/github-logo.png" class="w-7 h-7" alt="GitHub Logo">
                    <h1 class="text-lg md:text-2xl font-semibold">GitHub Issues Tracker</h1>
                </div>

                <!-- Search + Button -->
                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full md:w-auto">
                    <input type="text" placeholder="Search issues..."
                        class="input input-bordered w-full sm:w-64 md:w-72">

                    <button class="btn btn-primary text-white w-full sm:w-auto">
                        <i class="fa-solid fa-plus mr-1"></i>
                        New Issue
                    </button>
                </div>

            </div>

        </div>
    </nav>

    <main>
        <section>
            
        </section>
    </main>




</body>

</html>
